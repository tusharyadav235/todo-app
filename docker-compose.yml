services:

  backend:
    image: tusharyadaav/todo-backend:latest
    container_name: todo-backend
    pull_policy: always
    restart: unless-stopped
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - database
    networks:
      - todo-network

  frontend:
    image: tusharyadaav/todo-frontend:latest
    container_name: todo-frontend
    pull_policy: always
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - todo-network

  database:
    image: mysql:8
    container_name: database
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: tododb
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - todo-network

volumes:
  db-data:

networks:
  todo-network:
    driver: bridge