services:

  backend:
    image: tusharyadaav/todo-backend:latest
    container_name: todo-backend
    pull_policy: always
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - todo-network

  frontend:
    image: tusharyadaav/todo-frontend:latest
    container_name: todo-frontend
    pull_policy: always
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge