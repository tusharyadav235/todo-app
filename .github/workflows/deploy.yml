name: Todo App — CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/todo-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/todo-frontend

jobs:
  # ============================================
  # JOB 1: BUILD & TEST (Backend)
  # ============================================
  build-test:
    name: Build & Test Java Backend
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout karo
        uses: actions/checkout@v4.2.2          # ✅ Node.js 24 compatible

      - name: Java 17 setup karo
        uses: actions/setup-java@v4.7.0        # ✅ Node.js 24 compatible
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven build & test karo
        run: |
          cd backend
          mvn clean test -B

      - name: Test results upload karo
        uses: actions/upload-artifact@v4.6.2   # ✅ Node.js 24 compatible
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/
          if-no-files-found: ignore            # ✅ Warning fix — files na ho toh skip karo

  # ============================================
  # JOB 2: DOCKER IMAGES BUILD & PUSH
  # ============================================
  docker-build-push:
    name: Docker Images Build & Push
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Code checkout karo
        uses: actions/checkout@v4.2.2          # ✅ Node.js 24 compatible

      - name: Docker Hub login karo
        uses: docker/login-action@v3.4.0       # ✅ Node.js 24 compatible
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Buildx setup karo
        uses: docker/setup-buildx-action@v3.10.0  # ✅ Node.js 24 compatible

      - name: Backend Docker image build & push karo
        uses: docker/build-push-action@v6.15.0    # ✅ v6 — Node.js 24 compatible
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend Docker image build & push karo
        uses: docker/build-push-action@v6.15.0    # ✅ v6 — Node.js 24 compatible
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB 3: EC2 DEPLOY
  # ============================================
  deploy-to-ec2:
    name: EC2 Par Deploy Karo
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Code checkout karo
        uses: actions/checkout@v4.2.2          # ✅ Node.js 24 compatible

      - name: docker-compose.yml EC2 par bhejo
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/todo-app"

      - name: EC2 par deploy karo (SSH se)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/todo-app

            echo "Latest images pull ho rahe hain..."
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest

            # Purane containers band karo
            docker compose down --remove-orphans

            # Nayi images se start karo (--pull always = fresh image lega)
            docker compose up -d --pull always

            # Health check
            sleep 15
            echo "Health check..."
            curl -f http://localhost:8080/api/todos/health || exit 1
            echo "Deploy successful!"

            # Purani dangling images saaf karo
            docker image prune -f

  # ============================================
  # JOB 4: DEPLOY NOTIFICATION
  # ============================================
  notify:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: deploy-to-ec2
    if: always()

    steps:
      - name: Success message
        if: needs.deploy-to-ec2.result == 'success'
        run: echo "✅ Deploy ho gaya! App EC2 par chal raha hai."

      - name: Failure message
        if: needs.deploy-to-ec2.result == 'failure'
        run: echo "❌ Deploy fail ho gaya. Logs check karo!"