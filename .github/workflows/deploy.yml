name: Todo App — CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/todo-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/todo-frontend

jobs:
  # ============================================
  # JOB 1: BUILD & TEST (Backend)
  # ============================================
  build-test:
    name: Build & Test Java Backend
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout karo
        uses: actions/checkout@v4

      - name: Java 17 setup karo
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven build & test karo
        run: |
          cd backend
          mvn clean test -B
        
      - name: Test results upload karo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/

  # ============================================
  # JOB 2: DOCKER IMAGES BUILD & PUSH
  # ============================================
  docker-build-push:
    name: Docker Images Build & Push
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Code checkout karo
        uses: actions/checkout@v4

      - name: Docker Hub login karo
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Buildx setup karo
        uses: docker/setup-buildx-action@v3

      - name: Backend Docker image build & push karo
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend Docker image build & push karo
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB 3: EC2 DEPLOY
  # ============================================
  deploy-to-ec2:
    name: EC2 Par Deploy Karo
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Code checkout karo (docker-compose ke liye)
        uses: actions/checkout@v4

      - name: docker-compose.yml EC2 par bhejo
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/todo-app"

      - name: EC2 par deploy karo (SSH se)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Project directory mein jao
            cd /home/ubuntu/todo-app

            # Docker Hub se latest images khicho
            echo "Docker images pull ho rahe hain..."
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest

            # docker-compose.yml mein latest image tags set karo
            export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            export FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}

            # Purane containers band karo
            docker compose down --remove-orphans

            # Nayi images se start karo
            docker compose up -d

            # Health check karo
            sleep 15
            echo "Health check..."
            curl -f http://localhost:8080/api/todos/health || exit 1
            echo "Deploy successful! App chal raha hai."

            # Purani images saaf karo
            docker image prune -f

  # ============================================
  # JOB 4: DEPLOY NOTIFICATION
  # ============================================
  notify:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: deploy-to-ec2
    if: always()

    steps:
      - name: Success message
        if: needs.deploy-to-ec2.result == 'success'
        run: echo "Deploy ho gaya! App EC2 par chal raha hai."
      
      - name: Failure message
        if: needs.deploy-to-ec2.result == 'failure'
        run: echo "Deploy fail ho gaya. Logs check karo!"
