name: Todo App — CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BACKEND_IMAGE: tusharyadaav/todo-backend
  FRONTEND_IMAGE: tusharyadaav/todo-frontend

jobs:
  # ============================================
  # JOB 1: BUILD & TEST (Backend)
  # ============================================
  build-test:
    name: Build & Test Java Backend
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4.2.2

      - name: Java 17 setup
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven build & test 
        run: |
          cd backend
          mvn clean test -B

      - name: Test results upload 
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

  # ============================================
  # JOB 2: DOCKER IMAGES BUILD & PUSH
  # ============================================
  docker-build-push:
    name: Docker Images Build & Push
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Code checkout 
        uses: actions/checkout@v4.2.2

      - name: Docker Hub login 
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Buildx setup 
        uses: docker/setup-buildx-action@v3.10.0

      - name: Backend Docker image build & push
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend Docker image build & push 
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB 3: EC2 DEPLOY
  # ============================================
  deploy-to-ec2:
    name: EC2 Deploy 
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Code checkout 
        uses: actions/checkout@v4.2.2

      - name: docker-compose.yml send on EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/todo-app"

      - name: EC2  deploy  (SSH )
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/todo-app

            # Stop old containers 
            docker compose down --remove-orphans

            # force delete old images
            docker rmi tusharyadaav/todo-backend:latest 2>/dev/null || true
            docker rmi tusharyadaav/todo-frontend:latest 2>/dev/null || true

            #=Pull fresh image from docker hub
            docker pull tusharyadaav/todo-backend:latest
            docker pull tusharyadaav/todo-frontend:latest

            # Start containers from new images
            source load-secrets.sh
            docker compose up -d

            # Health check — wait for backend 
            sleep 15
            echo "Health check..."
            curl -f http://localhost:8080/api/todos/health || exit 1
            echo "Deploy successful!"

            # Dangling images saaf karo
            docker image prune -f

  # ============================================
  # JOB 4: DEPLOY NOTIFICATION
  # ============================================
  notify:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: deploy-to-ec2
    if: always()

    steps:
      - name: Success message
        if: needs.deploy-to-ec2.result == 'success'
        run: echo "✅ Deploy done."

      - name: Failure message
        if: needs.deploy-to-ec2.result == 'failure'
        run: echo "❌ Deploy fail . check Logs"
